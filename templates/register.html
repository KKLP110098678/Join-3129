<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join</title>
</head>
<body>
    <header>
        <img src="../assets/icon/logowhiteheader.svg" alt="Join Logo">
    </header>
    <main>
        <form onsubmit="">
            <div class="register-form-header">
                <span>Sign up</span>
                <div class="seperator"></div>
            </div>
            <div class="register-form-body">
                <div class="field-container">
                    <div class="input-icon-container">
                        <input type="text" id="username" name="username" placeholder="Username" required>
                        <img src="../assets/icon/sign/person.svg" alt="Username Icon">
                    </div>
                </div>
                <div class="field-container">
                    <div class="input-icon-container">
                        <input type="email" id="email" name="email" placeholder="Email" required>
                        <img src="../assets/icon/sign/email.svg" alt="Email Icon">
                    </div>
                </div>
                <div class="field-container">
                    <div class="input-icon-container">
                        <input type="password" id="password" name="password" placeholder="Password" required>
                        <img src="../assets/icon/sign/password.svg" alt="Password Icon">
                    </div>
                </div>
                <div class="field-container">
                    <div class="input-icon-container">
                        <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirm Password" required>
                        <img src="../assets/icon/sign/password.svg" alt="Confirm Password Icon">
                    </div>
                </div>
                <button type="submit">Register</button>
            </div>
        </form>
    </main>
</body>
</html>
