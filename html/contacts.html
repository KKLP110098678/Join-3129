<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacts</title>

    <link rel="icon" type="image/svg" href="../assets/icon/logo-blue.svg">
    <link rel="stylesheet" href="../css/standard.css">
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="../css/header.css">
    <link rel="stylesheet" href="../css/contacts.css">
</head>

<body onload="init()">

    <header class="header">
        <div id="headerContent" class="header-content"></div>
    </header>
    
    <aside id="sidebarContent"></aside>

    <main class="contacts-container">
        <section class="contact-list-section">
            <div class="button-container">
                <button class="btn-add-contact" onclick="openAddContactOverlay()">
                    Add new contact <img src="../assets/icon/contacts/person_add.svg" alt="">
                </button>
            </div>

            <button class="btn-add-contact-mobile" onclick="openAddContactOverlay()">
                <img src="../assets/icon/contacts/person_add.svg" alt="">
            </button>

            <div class="contact-list-scroll">
                <!-- renderContacts() fügt hier die Kontakte ein -->
            </div>
        </section>

        <section class="contact-details-section" id="contactDetails">
        </section>

        <div id="contact-detail-view" class="contact-detail-container">
            <div class="no-selection">Wähle einen Kontakt aus, um Details zu sehen.</div>
        </div>
    </main>

    <!-- ADD CONTACT OVERLAY -->
    <div id="addContactOverlay" class="overlay d-none">
        <div class="overlay-content form-overlay">
            <div class="overlay-blue-part">
                <span class="close-btn white-close-btn" onclick="closeAddContactOverlay()">✖</span>
                <img src="../assets/icon/logo-white.svg" alt="Join logo" class="overlay-logo">
                <h2>Add contact</h2>
                <p>Tasks are better with a team!</p>
                <div class="blue-separator d-none"></div>
            </div>
            <div class="overlay-white-part">
                <div class="overlay-avatar-container">
                   <div class="avatar-circle">
                       <img src="../assets/icon/sign/person.svg" alt="">
                   </div>
                </div>
                <form onsubmit="addNewContact(event)">
                    <div class="input-wrapper">
                        <input type="text" id="contactName" placeholder="Name" required>
                        <img src="../assets/icon/sign/person.svg" alt="" class="input-icon">
                    </div>
                    <div class="input-wrapper">
                        <input type="email" id="contactEmail" placeholder="Email" required>
                        <img src="../assets/icon/sign/email.svg" alt="" class="input-icon">
                    </div>
                    <div class="input-wrapper">
                        <input type="tel" id="contactPhone" placeholder="Phone" required>
                        <img src="../assets/icon/sign/phone.svg" alt="" class="input-icon">
                    </div>
                    <div class="overlay-buttons form-buttons">
                        <button type="button" class="btn-cancel" onclick="closeAddContactOverlay()">Cancel ✖</button>
                        <button type="submit" class="btn-create">Create contact ✓</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- EDIT CONTACT OVERLAY -->
    <div id="editContactOverlay" class="overlay d-none">
        <div class="overlay-content form-overlay">
            <div class="overlay-blue-part">
                <span class="close-btn white-close-btn" onclick="closeEditContactOverlay()">✖</span>
                <img src="../assets/icon/logo-white.svg" alt="Join logo" class="overlay-logo">
                <h2>Edit contact</h2>
                <div class="blue-separator d-none"></div>
            </div>
            <div class="overlay-white-part">
                <div class="overlay-avatar-container">
                   <div class="avatar-circle">
                       <img src="../assets/icon/sign/person.svg" alt="">
                   </div>
                </div>
                <form id="editContactForm" onsubmit="saveEditedContact(event)">
                    <input type="hidden" id="editContactIndex">
                    <div class="input-wrapper">
                        <input type="text" id="editContactName" placeholder="Name" required>
                        <img src="../assets/icon/sign/person.svg" alt="" class="input-icon">
                    </div>
                    <div class="input-wrapper">
                        <input type="email" id="editContactEmail" placeholder="Email" required>
                        <img src="../assets/icon/sign/email.svg" alt="" class="input-icon">
                    </div>
                    <div class="input-wrapper">
                        <input type="tel" id="editContactPhone" placeholder="Phone" required>
                        <img src="../assets/icon/sign/phone.svg" alt="" class="input-icon">
                    </div>
                    <div class="overlay-buttons form-buttons">
                        <button type="button" class="btn-cancel" onclick="closeEditContactOverlay()">Cancel ✖</button>
                        <button type="submit" class="btn-create">Save ✓</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

</body>

<script src="../js/database/firebase-app.js"></script>
<script src="../js/database/firebase-database.js"></script>
<script src="../js/database/firebaseConfig.js"></script>
<script src="../templates/headerTemplate.js"></script>
<script src="../templates/sidebarTemplate.js"></script>
<script src="../templates/contactsTemplate.js"></script>
<script src="../script/contacts.js"></script>
<script src="../script/script.js"></script>

</html>
