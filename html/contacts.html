<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacts</title>

    <link rel="stylesheet" href="../css/standard.css">
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="../css/header.css">
    <link rel="stylesheet" href="../css/contacts.css">
</head>

<body onload="init()">

    <header class="header">
        <div id="headerContent" class="header-content"></div>
    </header>
    <aside id="sidebarContent"></aside>

    <main class="contacts-container">
        <section class="contact-list-section">
            <div class="button-container">
                <button class="btn-add-contact">
                    Add new contact <img src="icon-person-add.svg" alt="">
                </button>
            </div>
            
                <div class="contact-list-scroll">
                    <!-- renderContacts() fügt hier die Kontakte ein -->
                </div>
        </section>

        <section class="contact-details-section" id="contactDetails">
        </section>

        <div id="contact-detail-view" class="contact-detail-container">
            <div class="no-selection">Wähle einen Kontakt aus, um Details zu sehen.</div>
        </div>
    </main>

    <script src="../script/script.js"></script>
    <script src="../script/contacts.js"></script>
    <script src="../templates/headerTemplate.js"></script>
    <script src="../templates/sidebarTemplate.js"></script>
    <script src="../templates/contactsTemplate.js"></script>
</body>

</html>
