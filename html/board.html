<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Board</title>

    <link rel="icon" type="image/svg" href="../assets/icon/logo-blue.svg">
    <link rel="stylesheet" href="../css/fonts.css">
    <link rel="stylesheet" href="../css/standard.css">
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="../css/header.css">
    <link rel="stylesheet" href="../css/board.css">
    <link rel="stylesheet" href="../css/buttons.css">
    <link rel="stylesheet" href="../css/forms.css">
    <link rel="stylesheet" href="../css/add-task-page.css">
    <link rel="stylesheet" href="../css/board-mobile.css">
    <link rel="stylesheet" href="../css/add-task-overlay.css">
</head>

<body onload="init()">

    <header>
        <div id="headerContent" class="header-content"></div>
    </header>

    <aside id="sidebarContent"></aside>

    <main>
        <div id="boardContent">
            <div class="upper-board">
                <div class="searchbar">
                    <div class="searchbar-input">
                        <input id="searchField" class="search-field" type="search" placeholder="Find Task"
                            oninput="filterTasks()">
                        <div class="seperationbar-input"></div>
                        <button class="input-glass"><img src="../assets/icon/task/search.svg" alt=""></button>
                    </div>
                    <button class="add-task-btn btn-primary" onclick="openAddTaskForm('todo')">Add task +</button>
                </div>
                <div class="tasksbar">
                    <div class="taskbar-tab">
                        <p>To do</p>
                        <button onclick="openAddTaskForm('todo')" class="taskbar-btn">+</button>
                    </div>
                    <div class="taskbar-tab">
                        <p>In progress</p>
                        <button onclick="openAddTaskForm('inProgress')" class="taskbar-btn">+</button>
                    </div>
                    <div class="taskbar-tab">
                        <p>Await feedback</p>
                        <button onclick="openAddTaskForm('awaitFeedback')" class="taskbar-btn">+</button>
                    </div>
                    <div class="taskbar-tab">
                        <p>Done</p>
                    </div>
                </div>
            </div>
            <div class="lower-board">
                <div class="lower-board-content">
                    <div class="tab-content-box drop-area" id="toDoBox" ondragover="allowDrop(event)"
                        ondragleave="dragLeave(event)" ondrop="drop(event, 'todo')">
                    </div>

                    <div class="tab-content-box drop-area" id="progressBox" ondragover="allowDrop(event)"
                        ondragleave="dragLeave(event)" ondrop="drop(event, 'inprogress')">
                    </div>

                    <div class="tab-content-box drop-area" id="feedbackBox" ondragover="allowDrop(event)"
                        ondragleave="dragLeave(event)" ondrop="drop(event, 'awaitfeedback')">
                    </div>

                    <div class="tab-content-box drop-area" id="doneBox" ondragover="allowDrop(event)"
                        ondragleave="dragLeave(event)" ondrop="drop(event, 'done')">
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Add Task Overlay -->
    <div class="add-task-form" id="addTaskOverlay" onclick="closeOnBackdrop(event)">
        <div class="form-container" id="addTaskOverlayContainer"></div>
    </div>

    <dialog id="taskDetailOverlay" onclick="closeTaskDetailOnBackdrop(event)">
        <div class="task-detail-container" id="taskDetailContainer"></div>
    </dialog>

</body>

<script src="../js/database/firebase-app.js"></script>
<script src="../js/database/firebase-database.js"></script>
<script src="../js/database/firebaseConfig.js"></script>
<script src="../js/database/userDB.js"></script>
<script src="../script/contacts.js"></script>
<script src="../js/database/taskDB.js"></script>
<script src="../templates/headerTemplate.js"></script>
<script src="../templates/sidebarTemplate.js"></script>
<script src="../templates/boardCardTemplate.js"></script>
<script src="../templates/addTaskOverlayTemplate.js"></script>
<script src="../script/taskForm.js"></script>
<script src="../script/board.js"></script>
<script src="../script/dragNdrop.js"></script>
<script src="../script/script.js"></script>

</html>
