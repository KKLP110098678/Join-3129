<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join</title>

    <link rel="stylesheet" href="/Join-3129/css/standard.css">
    <link rel="stylesheet" href="/Join-3129/css/sidebar.css">
    <link rel="stylesheet" href="/Join-3129/css/header.css">
    <link rel="stylesheet" href="/Join-3129/css/dashboard.css">
</head>

<body>

    <header class="header">
        <div class="header-content">
            <div class="header-logo">
                <img src="/Join-3129/assets/icon/logo-white.svg" alt="join logo">
            </div>
            <div class="header-interaction">
                <div>
                    <h3 class="header-headline">Kanban Project Managment Tool</h3>
                </div>
                <div>
                    <a><img class="help-icon" src="/Join-3129/assets/icon/questionmark.svg"
                            alt="questionmark help link"></a>
                </div>
                <div class="user-icon-border">
                    <div class="user-icon">
                        <a>AA</a>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <aside class="sidebar">
        <nav class="menu">
            <div class="menu-items-container">
                <a href="#" class="menu-item active">
                    <img src="/Join-3129/assets/icon/menuIcons/summary.svg"> Summary
                </a>
                <a href="#" class="menu-item">
                    <img src="/Join-3129/assets/icon/menuIcons/add-task.svg" alt=""> Add Task
                </a>
                <a href="#" class="menu-item">
                    <img src="/Join-3129/assets/icon/menuIcons/board.svg" alt=""> Board
                </a>
                <a href="#" class="menu-item">
                    <img src="/Join-3129/assets/icon/menuIcons/contacts.svg" alt=""> Contacts
                </a>
            </div>
            <div class="sidebar-footer">
                <a href="#">Privacy Policy</a>
                <a href="#">Legal notice</a>
            </div>
        </nav>
    </aside>

    <main>
        <h1>Good morning, User</h1>
        <div class="active-tasks">
            <div class="active-task"></div>
            <div class="task-in-board"></div>
        </div>
        <div class="tasks-overview">
            <div class="to-do"></div>
            <div class="in-progress"></div>
            <div class="awaiting-feedback"></div>
            <div class="done"></div>
        </div>
    </main>

</body>

</html>
