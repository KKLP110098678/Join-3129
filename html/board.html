<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Board</title>

    <link rel="icon" type="image/svg" href="../assets/icon/logo-blue.svg">
    <link rel="stylesheet" href="../css/standard.css">
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="../css/header.css">
    <link rel="stylesheet" href="../css/board.css">
    <link rel="stylesheet" href="../css/fonts.css">
    <link rel="stylesheet" href="../css/buttons.css">
</head>

<body onload="init()">

    <header>
        <div id="headerContent" class="header-content"></div>
    </header>
    <aside id="sidebarContent"></aside>

    <main>
        <div id="boardContent">
            <div class="upper-board">
                <div class="searchbar">
                    <div class="searchbar-input">
                        <input class="search-field" type="search" placeholder="Find Task">
                        <div class="seperationbar-input"></div>
                        <button class="input-glass"><img src="../assets/icon/task/search.svg" alt=""></button>
                    </div>
                    <button class="add-task-btn btn-primary" onclick="openAddTaskForm('to do')">Add task +</button>
                </div>
                <div class="tasksbar">
                    <div class="taskbar-tab">
                        <p>To do</p>
                        <button class="taskbar-btn">+</button>
                    </div>
                    <div class="taskbar-tab">
                        <p>In progress</p>
                        <button class="taskbar-btn">+</button>
                    </div>
                    <div class="taskbar-tab">
                        <p>Await feedback</p>
                        <button class="taskbar-btn">+</button>
                    </div>
                    <div class="taskbar-tab">
                        <p>Done</p>
                    </div>
                </div>
            </div>
            <div class="lower-board">
                <div class="lower-board-content">
                    <div class="tab-content-box drop-area" id="toDoBox"></div>
                    <div class="tab-content-box drop-area" id="progressBox"></div>
                    <div class="tab-content-box drop-area" id="feedbackBox"></div>
                    <div class="tab-content-box drop-area" id="doneBox"></div>
                </div>
            </div>
        </div>
    </main>
    <!-- Add Task Overlay -->
    <div class="add-task-form" id="addTaskOverlay" onclick="closeOnBackdrop(event)">
        <div class="form-container">
            <div class="form-header">
                <h2>Add Task</h2>
                <button class="btn-light" id="btn-close" onclick="closeAddTaskForm()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 13.4L7.09999 18.3C6.91665 18.4834 6.68332 18.575 6.39999 18.575C6.11665 18.575 5.88332 18.4834 5.69999 18.3C5.51665 18.1167 5.42499 17.8834 5.42499 17.6C5.42499 17.3167 5.51665 17.0834 5.69999 16.9L10.6 12L5.69999 7.10005C5.51665 6.91672 5.42499 6.68338 5.42499 6.40005C5.42499 6.11672 5.51665 5.88338 5.69999 5.70005C5.88332 5.51672 6.11665 5.42505 6.39999 5.42505C6.68332 5.42505 6.91665 5.51672 7.09999 5.70005L12 10.6L16.9 5.70005C17.0833 5.51672 17.3167 5.42505 17.6 5.42505C17.8833 5.42505 18.1167 5.51672 18.3 5.70005C18.4833 5.88338 18.575 6.11672 18.575 6.40005C18.575 6.68338 18.4833 6.91672 18.3 7.10005L13.4 12L18.3 16.9C18.4833 17.0834 18.575 17.3167 18.575 17.6C18.575 17.8834 18.4833 18.1167 18.3 18.3C18.1167 18.4834 17.8833 18.575 17.6 18.575C17.3167 18.575 17.0833 18.4834 16.9 18.3L12 13.4Z" fill="#4589FF"/>
                    </svg>
                </button>
            </div>
            <div class="form-content">
                <div class="form-group">
                    <label for="taskTitle">Title</label>
                    <input type="text" id="taskTitle" placeholder="Enter a title">
                </div>
                <div class="form-group">
                    <label for="taskDescription">Description</label>
                    <textarea id="taskDescription" rows="3" placeholder="Enter a description"></textarea>
                </div>
                <div class="form-group">
                    <label for="taskCategory">Category</label>
                    <select id="taskCategory">
                        <option value="User Story">User Story</option>
                        <option value="Technical Task">Technical Task</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="taskPriority">Priority</label>
                    <select id="taskPriority">
                        <option value="urgent">Urgent</option>
                        <option value="medium" selected>Medium</option>
                        <option value="low">Low</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="taskDueDate">Due Date</label>
                    <input type="date" id="taskDueDate">
                </div>
            </div>
            <input type="hidden" id="taskStatus" value="todo">
            <div class="form-buttons">
                <button class="btn-primary-with-icon" onclick="saveNewTask()">
                    Create Task
                <svg width="16" height="12" viewBox="0 0 16 12" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M5.288 8.775L13.763 0.3C13.963 0.1 14.2005 0 14.4755 0C14.7505 0 14.988 0.1 15.188 0.3C15.388 0.5 15.488 0.7375 15.488 1.0125C15.488 1.2875 15.388 1.525 15.188 1.725L5.988 10.925C5.788 11.125 5.55467 11.225 5.288 11.225C5.02133 11.225 4.788 11.125 4.588 10.925L0.288 6.625C0.088 6.425 -0.00783333 6.1875 0.0005 5.9125C0.00883333 5.6375 0.113 5.4 0.313 5.2C0.513 5 0.7505 4.9 1.0255 4.9C1.3005 4.9 1.538 5 1.738 5.2L5.288 8.775Z" fill="white"/>
                </svg>
                </button>
            </div>
        </div>
    </div>

</body>
<script src="../js/overlays/boardAddTask.js"></script>
<script src="../script/script.js"></script>
<script src="../templates/headerTemplate.js"></script>
<script src="../templates/sidebarTemplate.js"></script>
<script src="../script/dragNdrop.js"></script>
<script src="../templates/taskTemplate.js"></script>

</html>
