<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Board</title>

    <link rel="icon" type="image/svg" href="../assets/icon/logo-blue.svg">
    <link rel="stylesheet" href="../css/standard.css">
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="../css/header.css">
    <link rel="stylesheet" href="../css/board.css">
    <link rel="stylesheet" href="../css/fonts.css">
    <link rel="stylesheet" href="../css/buttons.css">
</head>

<body onload="init()">

    <header>
        <div id="headerContent" class="header-content"></div>
    </header>
    <aside id="sidebarContent"></aside>

    <main>
        <div id="boardContent">
            <div class="upper-board">
                <div class="searchbar">
                    <div class="searchbar-input">
                        <input class="search-field" type="search" placeholder="Find Task">
                        <div class="seperationbar-input"></div>
                        <button class="input-glass"><img src="../assets/icon/task/search.svg" alt=""></button>
                    </div>
                    <button class="add-task-btn btn-primary">Add task +</button>
                </div>
                <div class="tasksbar">
                    <div class="taskbar-tab">
                        <p>To do</p>
                        <button class="taskbar-btn">+</button>
                    </div>
                    <div class="taskbar-tab">
                        <p>In progress</p>
                        <button class="taskbar-btn">+</button>
                    </div>
                    <div class="taskbar-tab">
                        <p>Await feedback</p>
                        <button class="taskbar-btn">+</button>
                    </div>
                    <div class="taskbar-tab">
                        <p>Done</p>
                    </div>
                </div>
            </div>
            <div class="lower-board">
                <div class="lower-board-content">
                    <div class="tab-content-box drop-area" id="toDoBox"></div>
                    <div class="tab-content-box drop-area" id="progressBox"></div>
                    <div class="tab-content-box drop-area" id="feedbackBox"></div>
                    <div class="tab-content-box drop-area" id="doneBox"></div>
                </div>
            </div>
        </div>
    </main>

</body>

<script src="../script/script.js"></script>
<script src="../templates/headerTemplate.js"></script>
<script src="../templates/sidebarTemplate.js"></script>
<script src="../script/dragNdrop.js"></script>
<script src="../templates/taskTemplate.js"></script>

</html>
