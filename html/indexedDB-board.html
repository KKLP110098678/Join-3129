<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Board - IndexedDB</title>

    <link rel="icon" type="image/svg" href="../assets/icon/logo-blue.svg">
    <link rel="stylesheet" href="../css/standard.css">
    <link rel="stylesheet" href="../css/board.css">
    <link rel="stylesheet" href="../css/buttons.css">
    <link rel="stylesheet" href="../css/fonts.css">
    <link rel="stylesheet" href="../css/indexedDB-Test-CSS/board.css">
</head>

<body onload="initBoard()">

    <main>
        <div id="boardContent">
            <div class="upper-board">
                <h1>Board <small>(IndexedDB Example)</small></h1>
                <div class="searchbar">
                    <input class="search-field" id="searchInput" type="search" placeholder="Find Task" oninput="filterTasks()">
                    <button class="btn-primary add-task-btn" onclick="openAddTaskForm('todo')">Add task +</button>
                </div>
                <div class="tasksbar">
                    <div class="taskbar-tab">
                        <p>To do</p>
                        <button class="btn-add" onclick="openAddTaskForm('todo')"></button>
                    </div>
                    <div class="taskbar-tab">
                        <p>In progress</p>
                        <button class="btn-add" onclick="openAddTaskForm('progress')"></button>
                    </div>
                    <div class="taskbar-tab">
                        <p>Await feedback</p>
                        <button class="btn-add" onclick="openAddTaskForm('feedback')"></button>
                    </div>
                    <div class="taskbar-tab">
                        <p>Done</p>
                    </div>
                </div>
            </div>
            <div class="lower-board">
                <div class="lower-board-content">
                    <div class="tab-content-box" id="toDoBox"
                         ondragover="allowDrop(event)" ondrop="dropTask(event, 'todo')"
                         ondragenter="dragEnter(event)" ondragleave="dragLeave(event)">
                    </div>
                    <div class="tab-content-box" id="progressBox"
                         ondragover="allowDrop(event)" ondrop="dropTask(event, 'progress')"
                         ondragenter="dragEnter(event)" ondragleave="dragLeave(event)">
                    </div>
                    <div class="tab-content-box" id="feedbackBox"
                         ondragover="allowDrop(event)" ondrop="dropTask(event, 'feedback')"
                         ondragenter="dragEnter(event)" ondragleave="dragLeave(event)">
                    </div>
                    <div class="tab-content-box" id="doneBox"
                         ondragover="allowDrop(event)" ondrop="dropTask(event, 'done')"
                         ondragenter="dragEnter(event)" ondragleave="dragLeave(event)">
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Add Task Overlay -->
    <div class="add-task-form" id="addTaskOverlay" onclick="closeOnBackdrop(event)">
        <div class="form-container">
            <div class="form-header">
                <h2>Add Task</h2>
                <button class="btn-light" id="btn-close" onclick="closeAddTaskForm()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 13.4L7.09999 18.3C6.91665 18.4834 6.68332 18.575 6.39999 18.575C6.11665 18.575 5.88332 18.4834 5.69999 18.3C5.51665 18.1167 5.42499 17.8834 5.42499 17.6C5.42499 17.3167 5.51665 17.0834 5.69999 16.9L10.6 12L5.69999 7.10005C5.51665 6.91672 5.42499 6.68338 5.42499 6.40005C5.42499 6.11672 5.51665 5.88338 5.69999 5.70005C5.88332 5.51672 6.11665 5.42505 6.39999 5.42505C6.68332 5.42505 6.91665 5.51672 7.09999 5.70005L12 10.6L16.9 5.70005C17.0833 5.51672 17.3167 5.42505 17.6 5.42505C17.8833 5.42505 18.1167 5.51672 18.3 5.70005C18.4833 5.88338 18.575 6.11672 18.575 6.40005C18.575 6.68338 18.4833 6.91672 18.3 7.10005L13.4 12L18.3 16.9C18.4833 17.0834 18.575 17.3167 18.575 17.6C18.575 17.8834 18.4833 18.1167 18.3 18.3C18.1167 18.4834 17.8833 18.575 17.6 18.575C17.3167 18.575 17.0833 18.4834 16.9 18.3L12 13.4Z" fill="#4589FF"/>
                    </svg>
                </button>
            </div>
            <div class="form-group">
                <label for="taskTitle">Title</label>
                <input type="text" id="taskTitle" placeholder="Enter a title">
            </div>
            <div class="form-group">
                <label for="taskDescription">Description</label>
                <textarea id="taskDescription" rows="3" placeholder="Enter a description"></textarea>
            </div>
            <div class="form-group">
                <label for="taskCategory">Category</label>
                <select id="taskCategory">
                    <option value="User Story">User Story</option>
                    <option value="Technical Task">Technical Task</option>
                </select>
            </div>
            <div class="form-group">
                <label for="taskPriority">Priority</label>
                <select id="taskPriority">
                    <option value="urgent">Urgent</option>
                    <option value="medium" selected>Medium</option>
                    <option value="low">Low</option>
                </select>
            </div>
            <div class="form-group">
                <label for="taskDueDate">Due Date</label>
                <input type="date" id="taskDueDate">
            </div>
            <input type="hidden" id="taskStatus" value="todo">
            <div class="form-buttons">
                <button class="btn-primary" onclick="saveNewTask()">Create Task</button>
            </div>
        </div>
    </div>
    <script src="../js/forms.js"></script>
    <script src="../js/database/indexedDB/indexedDB.js"></script>
    <script src="../templates/kanbanTemplate.js"></script>
    <script src="../js/render/board/render.js"></script>
    <script src="../js/board.js"></script>
    <script src="../js/overlays/add-task.js"></script>
    <!-- CRUD Operations-->
    <script src="../js/database/indexedDB/indexedDB.js"></script>
    <script src="../js/database/indexedDB/CRUD/create.js"></script>
    <script src="../js/database/indexedDB/CRUD/read.js"></script>
    <script src="../js/database/indexedDB/CRUD/update.js"></script>
    <script src="../js/database/indexedDB/CRUD/delete.js"></script>

</body>

</html>
