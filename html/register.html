<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join - Sign up</title>

  <link rel="stylesheet" href="../css/fonts.css">
  <link rel="stylesheet" href="../css/standard.css" />
  <link rel="stylesheet" href="../css/forms.css">
  <link rel="stylesheet" href="../css/register.css" />
  <link rel="stylesheet" href="../css/buttons.css" />
  <link rel="icon" type="image/svg" href="../assets/icon/logo-blue.svg">
</head>

<body onload="init()">

  <div class="content">

    <header>
      <img src="../assets/icon/logowhiteheader.svg" class="logo" alt="Join Logo" />
    </header>

    <main>
      <form class="register-form" onsubmit="registerUser(event)">
        <button class="back-btn" type="button" onclick="window.location.href='./login.html'">
        </button>
        <div>
          <div class="register-form-header">
            <span>Sign up</span>
            <div class="seperator"></div>
          </div>
          <div class="register-form-body">
            <div class="field-container">
              <div class="input-icon-container" id="username-field">
                <input onblur="validateName(); updateCheckboxDisabledState();" type="text" id="username" name="username"
                  placeholder="Username" required />
                <img src="../assets/icon/sign/person.svg" alt="Username Icon" />
              </div>
              <output class="error-message d-none" id="username-error" for="username">This field is required!</output>
            </div>
            <div class="field-container">
              <div class="input-icon-container" id="email-field">
                <input onblur="validateEmail(); updateCheckboxDisabledState();" type="email" id="email" name="email"
                  placeholder="Email" required />
                <img src="../assets/icon/sign/email.svg" alt="Email Icon" />
              </div>
              <output class="error-message d-none" id="email-error" for="email">This field is required!</output>
            </div>
            <div class="field-container">
              <div class="input-icon-container" id="password-field">
                <input onblur="validatePassword(); updateCheckboxDisabledState();" type="password" id="password"
                  name="password" placeholder="Password" required />
                <img src="../assets/icon/sign/lock.svg" id="password-toggle" alt="Password Icon" />
              </div>
              <output class="error-message d-none" id="password-error" for="password">This field is required!</output>
            </div>
            <div class="field-container">
              <div class="input-icon-container" id="confirm-password-field">
                <input onblur="validateConfirmPassword(); updateCheckboxDisabledState();" type="password"
                  id="confirm-password" name="confirm-password" placeholder="Confirm Password" required />
                <img src="../assets/icon/sign/lock.svg" id="confirm-password-toggle" alt="Confirm Password Icon" />
              </div>
              <output class="error-message d-none" id="confirm-password-error" for="confirm-password">This field is
                required!</output>
            </div>
          </div>
          <div class="checkbox-container">
            <label class="custom-checkbox" onchange="toggleSubmitDisabledState()">
              <input id="privacy-checkbox" class="checkbox-masked" type="checkbox" disabled />
              <span class="checkbox-label">
                I accept the
                <a href="../privacy-policy.html" data-text="Privacy policy" class="color-blue checkbox-link">Privacy
                  policy</a>
              </span>
            </label>
          </div>
          <button type="submit" class="btn-primary" id="submit-button" disabled>
            Sign up
            <span class="disabled-tooltip">Please fill out all fields and accept the privacy policy to proceed.</span>
          </button>
        </div>
      </form>
    </main>

    <footer>
      <a href="../privacy-policy.html">Privacy Policy</a>
      <a href="../legal-notice.html">Legal Notice</a>
    </footer>
    <div id="success-overlay" class="overlay hidden">
      <div class="overlay-box">
        <p>You signed up successfully</p>
      </div>
    </div>
  </div>

</body>

<script src="../script/script.js"></script>
<script src="../js/database/firebase-app.js"></script>
<script src="../js/database/firebase-database.js"></script>
<script src="../script/register.js"></script>
<script src="../js/database/firebaseConfig.js"></script>
<script src="../js/database/userDB.js"></script>

</html>
