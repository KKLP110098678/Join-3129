<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/fonts.css">
    <link rel="stylesheet" href="../css/standard.css">
    <link rel="stylesheet" href="../css/forms.css">
    <link rel="stylesheet" href="../css/buttons.css">
    <link rel="stylesheet" href="../css/login.css">
    <link rel="icon" type="image/svg" href="../assets/icon/logo-blue.svg">
    <title>Join - Login</title>
</head>

<body>

    <header>
        <img src="../assets/icon/logo-blue.svg" class="logo" alt="Join Logo">
        <div class="header-right"><span class="sign-up-info">Not a Join user?</span><a href="../html/register.html"><button class="btn-primary btn-login">Sign
                up</button></a></div>
    </header>

    <main>
        <form class="login-form" onsubmit="loginUser(event)">
            <div class="login-form-header">
                <span>Log in</span>
                <div class="seperator"></div>
            </div>
            <div class="login-form-body">
                <div class="input-contaier">
                    <input type="email" id="username" name="username" placeholder="Email" required>
                    <img src="../assets/icon/login/mail.svg" alt="Mail Icon">
                </div>
                <div class="input-contaier">
                    <input type="password" id="password" name="password" placeholder="Password" required>
                    <img src="../assets/icon/login/lock.svg" id="password-toggle" class="pointer" alt="Lock Icon">
                </div>
            </div>
            <span class="login-error-message d-none" id="login-error">Check your email and password. Please try again.</span>
            <div class="login-button-area">
                <button type="submit" class="btn-primary btn-login">Log in</button>
                <button type="button" id="guest-login-button" class="btn-light btn-login">Guest log in</button>
            </div>
        </form>
    </main>

    <footer>
        <a href="../privacy-policy.html">Privacy Policy</a>
        <a href="../legal-notice.html">Legal Notice</a>
    </footer>

</body>

    <script src="../js/database/firebase-app.js"></script>
    <script src="../js/database/firebase-database.js"></script>
    <script src="../js/database/dbConfig.js"></script>
    <script src="../js/database/userDB.js"></script>
    <script src="../js/login.js"></script>

</html>
